  <div class="container">
    <div class="left-side">
      <h2>Report E-Waste</h2>
      
      <form action="https://formsubmit.co/saviourivan2024@gmail.com" method="POST" id="report-form">
        
        <!-- Hidden fields for organized data -->
        <input type="hidden" name="_subject" value="New E-Waste Report - E-Waste Uganda">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="_honey" style="display:none">
        
        <!-- Optional: redirect after submit -->
        <!-- <input type="hidden" name="_next" value="https://yoursite.github.io/thanks.html"> -->

        <p>Fill in the form below to report e-waste for collection:</p>
        
        <label for="name">Name:</label>
        <input type="text" id="name" name="Name" required>

        <label for="phone">Telephone Number:</label>
        <input type="tel" inputmode="numeric" id="phone" name="Telephone" min="0" maxlength="10" required>
        
        <label for="location">Location:</label>
        <input type="text" id="location" name="Location" required>

        <label for="type">E-Waste Type:</label>
        <input type="text" id="type" name="E-Waste Type" required>

        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" name="Quantity" required min="0">

        <button type="submit">Submit</button>
      </form>
    </div>
  </div>

  <footer>
