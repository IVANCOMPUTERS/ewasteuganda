      <div class="container">
    <div class="left-side">
      <h2>Report E-Waste</h2>
      <form id="report-form">
        <p>Fill in the form below to report e-waste for collection:</p>
        <label for="name">Name:</label>
        <input type="text" id="name" required>

        <label for="name">Telephone Number:</label>
        <input type="number" id="phone" required min="0">

        <label for="location">Location:</label>
        <input type="text" id="location" required>

        <label for="type">E-Waste Type:</label>
        <input type="text" id="type" required>

        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" required min="0">

        <button type="submit">Submit</button>
      </form>
    </div>
    <div class="right-side">
      <h2>Reported E-Waste</h2>
      <div id="reported-data"></div>
    </div>
