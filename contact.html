<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - E-Waste Uganda</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <nav>
      <h1>E-Waste Uganda</h1>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="report.html">Report E-Waste</a></li>
        <li><a href="collections-points.html">Collection Points</a></li>
        <li><a href="awareness.html">Awareness</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="FAQs.html">FAQs</a></li>
      </ul>
      <button class="menu-toggle">☰</button>
    </nav>
  </header>

  <div class="container">
    <div class="left-side">
      <h2>Send a Message</h2><br><br>
      
      <form action="https://formsubmit.co/saviourivan2024@gmail.com" method="POST" id="contact-form">
        
        <!-- FormSubmit settings for organized data -->
        <input type="hidden" name="_subject" value="New Contact Message - E-Waste Uganda">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="_honey" style="display:none">
        
        <!-- Optional: redirect to thank you page -->
        <!-- <input type="hidden" name="_next" value="https://yoursite.github.io/thanks.html"> -->

        <label for="name">Name:</label>
        <input type="text" id="name" name="Name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="Email" required>

        <label for="message">Message:</label>
        <textarea id="message" name="Message" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>
  </div>

  <footer>
   <h3>&copy; 2026 E-Waste Uganda</h3>
    <p>Built by SAVIOUR IVAN (IVAN COMPUTERS)</p>
  </footer>

  <script>
    const menuToggle = document.querySelector('.menu-toggle');
    const navList = document.querySelector('header nav ul');

    menuToggle.addEventListener('click', () => {
      navList.style.display = navList.style.display === 'flex' ? 'none' : 'flex';
    });

  </script>
</body>
</html>
